                  example: "EMP-0001"
                selected_items:
                  type: array
                  items:
                    $ref: '#/components/schemas/SelectedItem'
      responses:
        '200':
          description: Approval result
          content:
            application/json:
              examples:
                success:
                  summary: Approved
                  value:
                    success: true
                    message: "Successfully approved 1 room(s) and declined 0 room(s)"
