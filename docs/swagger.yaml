                  example: "RB-EMP0001-20250901-20250905"
                hotelConfirmationNo:
                  type: string
                  example: "CONF-12345"
                status:
                  type: string
                  enum: [confirmed, cancelled, pending, completed]
                hotel:
                  type: object
                  required: [id]
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    cityCode:
                      type: string
                checkIn:
                  type: string
                  format: date
                checkOut:
                  type: string
                  format: date
                totalPrice:
                  type: number
                  format: float
                  minimum: 0
                currency:
                  type: string
                numOfRooms:
                  type: integer
                  minimum: 0
                guestList:
                  type: array
                  items:
                    type: object
                roomList:
                  type: array
                  items:
                    type: object
                contact:
                  type: object
                  properties:
                    firstname:
                      type: string
                    lastname:
                      type: string
                    phone:
                      type: string
                    email:
                      type: string
                cancellation:
                  type: array
                  items:
                    type: object
                remark:
                  type: string
                paymentMode:
                  type: string
                  enum: [direct_pay, bill_to_company]
      responses:
        '200':
          description: Confirmation result
          content:
            application/json:
              examples:
                success:
                  summary: Confirmed
                  value:
                    success: true
                    message: "Booking confirmation stored successfully"
                    data:
                      hotel_booking_id: "HB-0001"
                      booking_id: "RB-EMP0001-20250901-20250905"
                      external_booking_id: "EXT-BK-001"
                      hotel_confirmation_no: "CONF-12345"
                      booking_status: "confirmed"
                      contact:
                        firstName: "John"
                        lastName: "Doe"
                        phone: "+91-9876543210"
                        email: "john.doe@example.com"

