  /hotel_booking.booking.cancel_booking:
    post:
      tags: [Hotel Booking]
      summary: Cancel a hotel booking
      description: |
        Cancels a hotel booking and sets status to `cancelled`.
        For payments with status `payment_success`, initiates a HitPay refund
        and sets `refund_status` to `initialized`.
      operationId: cancelBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [booking_id]
              properties:
                booking_id:
                  type: string
                  description: External booking ID (bookingId from supplier)
                  example: "EXT-BK-001"
      responses:
        '200':
          description: Cancellation result
          content:
            application/json:
              examples:
                success:
                  summary: Cancelled with refund
                  value:
                    success: true
                    message: "Booking cancelled successfully"
                    data:
                      hotel_booking_id: "HB-0001"
                      booking_id: "EXT-BK-001"
                      booking_status: "cancelled"
                      refunds_processed: 1
                      refund_results:
                        - payment_name: "BP-0001"
                          transaction_id: "TXN-001"
                          refund_api_success: true
                          refund_api_response:
                            id: "REF-001"
                            status: "pending"
                already_cancelled:
                  summary: Already cancelled
                  value:
                    success: false
                    error: "Booking EXT-BK-001 is already cancelled"
                not_found:
                  summary: Not found
                  value:
                    success: false
                    error: "Booking not found with external_booking_id: EXT-BK-001"

  # ==========================================================================
  # PAYMENTS
  # ==========================================================================

  /payments.payments.create_payment_url:
    post:
      tags: [Payments]
      summary: Create a HitPay payment URL
      description: |
        Creates a payment URL using HitPay for a request booking.

        **Logic:**
        - If a pending (non-expired) payment exists → returns existing URL and resends email.
        - If a pending but expired payment exists → marks it expired, creates a new URL.
        - If no payment exists → creates new Booking Payments record and calls HitPay API.
      operationId: createPaymentUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_booking_id]
              properties:
                request_booking_id:
                  type: string
                  example: "RB-EMP0001-20250901-20250905"
                mode:
                  type: string
                  enum: [direct_pay, bill_to_company]
                  default: "direct_pay"
                  example: "direct_pay"
      responses:
        '200':
          description: Payment URL result
          content:
            application/json:
              examples:
                success:
                  summary: URL created
                  value:
                    success: true
                    message: "Payment URL created successfully"
                    data:
                      payment_id: "BP-0001"
                      request_booking_id: "RB-EMP0001-20250901-20250905"
                      request_booking_name: "RBD-0001"
                      payment_url: "https://hit.pay/payment/abc123"
                      amount: 600.0
                      currency: "USD"
                      hotel_id: "HTL-001"
                      hotel_name: "Grand Hotel"
                      room_count: 1
                      total_amount: 600.0
                      tax: 50.0
                      employee_name: "John Doe"
                      employee_email: "john.doe@example.com"
                      agent_email: "agent@example.com"
                      email_sent: true
                      email_recipients: ["john.doe@example.com"]
                      payment_status: "payment_pending"
                      payment_mode: "direct_pay"
                      hitpay_response:
                        id: "hp-order-001"
                        url: "https://hit.pay/payment/abc123"
                no_approved_rooms:
                  summary: No approved rooms found
                  value:
                    success: false
                    error: "No approved rooms found for request booking: RB-EMP0001-20250901-20250905"

  /payments.payments.payment_callback:
    post:
      tags: [Payments]
      summary: Handle payment gateway callback
      description: |
        Processes the payment callback received from HitPay after the customer
        completes (or fails) the payment. Updates `Booking Payments`,
        `Hotel Bookings`, `Request Booking Details`, and cart room statuses.
      operationId: paymentCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_id, status]
              properties:
                payment_id:
                  type: string
                  description: Booking Payments record name
                  example: "BP-0001"
                status:
                  type: string
                  enum: [success, failure, cancel]
                  description: Case-insensitive
                  example: "success"
                transaction_id:
                  type: string
                  example: "TXN-001"
                error_message:
                  type: string
                  example: "Card declined"
      responses:
        '200':
          description: Callback result
          content:
            application/json:
              examples:
                success:
                  summary: Payment success
                  value:
                    success: true
                    message: "Payment success processed successfully"
                    data:
                      payment_id: "BP-0001"
                      payment_status: "payment_success"
                      transaction_id: "TXN-001"
                      request_booking_link: "RBD-0001"
                      cart_status: "payment_success"
                failure:
                  summary: Payment failure
                  value:
                    success: true
                    message: "Payment failure processed successfully"
                    data:
                      payment_id: "BP-0001"
                      payment_status: "payment_failure"
                      transaction_id: null
                      request_booking_link: "RBD-0001"
                      cart_status: "payment_failure"
                invalid_status:
                  summary: Invalid status
                  value:
                    success: false
                    error: "Invalid status: xyz. Must be one of: success, failure, cancel"

  /payments.payments.update_payment:
    post:
      tags: [Payments]
      summary: Update payment details
      description: |
        Updates payment fields and cascades status changes to linked doctypes.

        **Lookup priority:** `order_id` → `transaction_id` → `request_booking_id` → `booking_id`

        At least one identifier and at least one updatable field must be provided.
      operationId: updatePayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: string
                  description: HitPay payment ID (data.id from create-payment response)
                  example: "hp-order-001"
                transaction_id:
                  type: string
                  example: "TXN-001"
                request_booking_id:
                  type: string
                  example: "RB-EMP0001-20250901-20250905"
                booking_id:
                  type: string
                  description: Hotel Bookings record name
                  example: "HB-0001"
                payment_status:
                  type: string
                  enum: [payment_pending, payment_failure, payment_success, payment_declined, payment_awaiting, payment_cancel, payment_expired, payment_refunded]
                callback_response:
                  description: Raw callback payload (string or object)
                  oneOf:
                    - type: string
                    - type: object
                payment_mode:
                  type: string
                  enum: [direct_pay, bill_to_company]
                total_amount:
                  type: number
                  format: float
                tax:
                  type: number
                  format: float
                currency:
                  type: string
                refund_status:
                  type: string
                  enum: [initialized, partially_refunded, fully_refunded]
                refund_amount:
                  type: number
                  format: float
                refund_date:
                  type: string
                  format: date
                  example: "2025-09-10"
                cancellation_reason:
                  type: string
                remarks:
                  type: string
      responses:
        '200':
          description: Update result
          content:
            application/json:
              examples:
                success:
                  summary: Updated
                  value:
                    success: true
                    message: "Payment updated successfully"
                    data:
                      payment_id: "BP-0001"
                      order_id: "hp-order-001"
                      transaction_id: "TXN-001"
                      request_booking_link: "RBD-0001"
                      booking_id: "HB-0001"
                      updated_fields: ["payment_status", "transaction_id"]
                      payment_status: "payment_success"
                no_identifier:
                  summary: No identifier provided
                  value:
                    success: false
                    error: "At least one of order_id, transaction_id, request_booking_id, or booking_id is required"

  /payments.payments.check_payment_expiry:
    post:
      tags: [Payments]
      summary: Check if a payment has expired
      description: |
        Checks the `expire_at` field of a payment. If expired and still pending,
        updates `payment_status` to `payment_expired` across all linked doctypes.
      operationId: checkPaymentExpiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_booking_id:
                  type: string
                  description: Required if `payment_id` not provided
                  example: "RB-EMP0001-20250901-20250905"
                payment_id:
                  type: string
                  description: Booking Payments record name — required if `request_booking_id` not provided
                  example: "BP-0001"
      responses:
        '200':
          description: Expiry check result
          content:
            application/json:
              examples:
                expired:
                  summary: Payment expired and updated
                  value:
                    success: true
                    expired: true
                    message: "Payment has expired and statuses have been updated"
                    data:
                      payment_id: "BP-0001"
                      payment_status: "payment_expired"
                      expire_at: "2025-08-10T12:00:00"
                      current_time: "2025-08-11T09:00:00"
                      request_booking_link: "RBD-0001"
                      booking_id: "HB-0001"
                not_expired:
                  summary: Payment still valid
                  value:
                    success: true
                    expired: false
                    message: "Payment has not expired yet"
                    data:
                      payment_id: "BP-0001"
                      payment_status: "payment_pending"
                      expire_at: "2025-09-10T12:00:00"
                      current_time: "2025-08-11T09:00:00"
                already_processed:
                  summary: Payment already completed
                  value:
                    success: true
                    expired: false
                    message: "Payment is not pending. Current status: payment_success"
                    data:
                      payment_id: "BP-0001"
                      payment_status: "payment_success"
                      expire_at: "2025-09-10T12:00:00"
                no_expiry:
                  summary: No expiry set
                  value:
                    success: true
                    expired: false
                    message: "Payment has no expiry set"
                    data:
                      payment_id: "BP-0001"
                      payment_status: "payment_pending"
                      expire_at: null
                no_identifier:
                  summary: No identifier provided
                  value:
                    success: false
                    error: "Either request_booking_id or payment_id is required"
