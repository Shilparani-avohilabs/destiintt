  # ==========================================================================
  # HOTEL BOOKING
  # ==========================================================================

  /hotel_booking.booking.create_booking:
    post:
      tags: [Hotel Booking]
      summary: Create / store a hotel booking confirmation
      description: |
        Stores booking confirmation details received from an external hotel supplier.
        - Links the booking to the matching Request Booking (`clientReference`).
        - Sends a confirmation email if status is `confirmed`.
        - Sets request status to `request_closed`.
        - Creates a `Booking Payments` record **unless** `paymentMode` is `direct_pay`.
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookingId, clientReference, status, hotel]
              properties:
                bookingId:
                  type: string
                  description: External booking ID from supplier
                  example: "EXT-BK-001"
                clientReference:
                  type: string
                  description: Maps to request_booking_id
                  example: "RB-EMP0001-20250901-20250905"
                hotelConfirmationNo:
                  type: string
                  example: "CONF-12345"
                status:
                  type: string
                  enum: [confirmed, cancelled, pending, completed]
                  example: "confirmed"
                hotel:
                  type: object
                  required: [id]
                  properties:
                    id:
                      type: string
                      example: "HTL-001"
                    name:
                      type: string
                      example: "Grand Hotel"
                    cityCode:
                      type: string
                      example: "BOM"
                checkIn:
                  type: string
                  format: date
                  example: "2025-09-01"
                checkOut:
                  type: string
                  format: date
                  example: "2025-09-05"
                totalPrice:
                  type: number
                  format: float
                  minimum: 0
                  example: 600.00
                currency:
                  type: string
                  default: "USD"
                  example: "USD"
                numOfRooms:
                  type: integer
                  minimum: 0
                  example: 1
                guestList:
                  type: array
                  items:
                    type: object
                roomList:
                  type: array
                  items:
                    type: object
                contact:
                  type: object
                  properties:
                    firstname:
                      type: string
                    lastname:
                      type: string
                    phone:
                      type: string
                    email:
                      type: string
                cancellation:
                  type: array
                  items:
                    type: object
                remark:
                  type: string
                paymentMode:
                  type: string
                  enum: [direct_pay, bill_to_company]
      responses:
        '200':
          description: Booking creation result
          content:
            application/json:
              examples:
                success:
                  summary: Booking created
                  value:
                    success: true
                    message: "Booking confirmation stored successfully"
                    data:
                      hotel_booking_id: "HB-0001"
                      booking_id: "RB-EMP0001-20250901-20250905"
                      external_booking_id: "EXT-BK-001"
                      hotel_confirmation_no: "CONF-12345"
                      request_booking_id: "RB-EMP0001-20250901-20250905"
                      employee: "EMP-0001"
                      company: "Acme Corp"
                      hotel_id: "HTL-001"
                      hotel_name: "Grand Hotel"
                      city_code: "BOM"
                      room_count: 1
                      check_in: "2025-09-01"
                      check_out: "2025-09-05"
                      total_amount: 600.0
                      currency: "USD"
                      booking_status: "confirmed"
                      payment_mode: "bill_to_company"
                      email_sent: true
                      contact:
                        firstName: "John"
                        lastName: "Doe"
                        phone: "+91-9876543210"
                        email: "john.doe@example.com"
                duplicate:
                  summary: Duplicate booking ID
                  value:
                    success: false
                    error: "Duplicate booking: bookingId EXT-BK-001 already exists"

  /hotel_booking.booking.confirm_booking:
    post:
      tags: [Hotel Booking]
      summary: Confirm an existing hotel booking (webhook)
      description: |
        Updates an existing Hotel Bookings record with confirmation details
        received from the hotel supplier. Does **not** link to Request Booking
        and does **not** send a confirmation email.

        Same request body as `create_booking`, except `hotelConfirmationNo` is **required**.
