                      request_booking_id: "RB-EMP0001-20250901-20250905"
                      employee: "EMP-0001"
                      approved_count: 1
                      declined_count: 0
                      request_status: "approval_received"
                      approved_hotels:
                        - hotel_id: "HTL-001"
                          hotel_name: "Grand Hotel"
                          supplier: "Hotelbeds"
