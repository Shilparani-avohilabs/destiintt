  # ==========================================================================
  # APPROVAL FLOW
  # ==========================================================================

  /request_booking.request.send_for_approval:
    post:
      tags: [Approval Flow]
      summary: Send selected rooms for employee approval
      description: |
        Marks selected rooms as `sent_for_approval` and sends an email notification
        to the employee and agent.

        **Note:** Use `room_rate_id` (unique) not `room_id` to identify rooms.
      operationId: sendForApproval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_booking_id, selected_items]
              properties:
                request_booking_id:
                  type: string
                  example: "RB-EMP0001-20250901-20250905"
                selected_items:
                  type: array
                  items:
                    $ref: '#/components/schemas/SelectedItem'
                  example:
                    - hotel_id: "HTL-001"
                      room_rate_ids: ["RR-001"]
      responses:
        '200':
          description: Approval send result
          content:
            application/json:
              examples:
                success:
                  summary: Sent for approval
                  value:
                    success: true
                    message: "Successfully sent 1 room(s) for approval"
                    data:
                      request_booking_id: "RB-EMP0001-20250901-20250905"
                      updated_count: 1
                      email_sent: true
                      email_recipients: ["john.doe@example.com", "agent@example.com"]
                      updated_hotels:
                        - hotel_id: "HTL-001"
                          hotel_name: "Grand Hotel"
                          supplier: "Hotelbeds"
                          rooms:
                            - room_id: "RM-001"
                              room_rate_id: "RR-001"
                              room_name: "Deluxe King"
                              price: 150.0
                              total_price: 600.0
                              tax: 50.0
                              currency: "USD"
                not_found:
                  summary: Booking not found
                  value:
                    success: false
                    error: "Request booking not found for ID: RB-EMP0001-20250901-20250905"

  /request_booking.request.approve_booking:
    post:
      tags: [Approval Flow]
      summary: Approve selected rooms
      description: |
        Marks selected rooms as `approved` and automatically sets all other rooms
        in the same hotels to `declined`.
      operationId: approveBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_booking_id, employee, selected_items]
